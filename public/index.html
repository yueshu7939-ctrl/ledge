<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ledge</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledge">
<meta name="theme-color" content="#ffcc00">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#ffe566 0%,#ffcc00 30%,#e879f9 70%,#c026d3 100%);background-attachment:fixed;color:#1a1a1a;min-height:100vh}
.header{background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.5);padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px;color:#1a1a1a}
.header .month{font-size:13px;color:#888}
.tabs{display:flex;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.4);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:12px 8px;font-size:13px;text-align:center;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:80px;font-weight:500}
.tab.active{color:#1a1a1a;border-bottom-color:#c026d3;font-weight:700}
.content{padding:16px;max-width:600px;margin:0 auto}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.metric{border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600}
.metric-value{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.metric-sub{font-size:11px;margin-top:3px}
.m-salary{background:rgba(255,220,0,0.25)}.m-salary .metric-label{color:#b38600}.m-salary .metric-value{color:#1a1a1a}.m-salary .metric-sub{color:#b38600}
.m-spent{background:rgba(255,100,100,0.15)}.m-spent .metric-label{color:#cc4444}.m-spent .metric-value{color:#e05555}.m-spent .metric-sub{color:#cc4444}
.m-budget{background:rgba(200,80,240,0.12)}.m-budget .metric-label{color:#9333ea}.m-budget .metric-value{color:#1a1a1a}.m-budget .metric-sub{color:#9333ea}
.m-saved{background:rgba(50,200,100,0.15)}.m-saved .metric-label{color:#16a34a}.m-saved .metric-value{color:#16a34a}.m-saved .metric-sub{color:#16a34a}
.card{background:rgba(255,255,255,0.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;border:1px solid rgba(255,255,255,0.9);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.bud-row{margin-bottom:14px}
.bud-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.bud-name{font-size:13px;font-weight:700;color:#1a1a1a}
.bud-nums{font-size:12px;color:#aaa}
.bud-nums .spent{color:#333;font-weight:600}
.bud-nums .over-spent{color:#e05555;font-weight:600}
.bud-track{height:9px;background:rgba(0,0,0,0.07);border-radius:5px;overflow:hidden}
.bud-fill{height:100%;border-radius:5px}
.bud-fill.over{background:linear-gradient(90deg,#f87171,#ef4444)!important}
.bud-sub{font-size:11px;margin-top:3px;color:#aaa}
.bud-sub.over{color:#e05555}
.bud-total{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(0,0,0,0.07);margin-top:4px}
.bud-total-label{font-size:13px;font-weight:700;color:#1a1a1a}
.bud-total-val{font-size:13px;font-weight:500;color:#666}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.tx-item:last-child{border-bottom:none}
.tx-desc{font-size:15px;font-weight:600;color:#1a1a1a}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.tx-date{font-size:11px;color:#bbb}
.tx-right{display:flex;align-items:center;gap:10px}
.tx-amt{font-size:15px;font-weight:700;color:#1a1a1a}
.del-btn{width:24px;height:24px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.8);color:#bbb;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:#444;margin-bottom:6px;display:block;font-weight:600}
.form-input{width:100%;padding:11px 14px;border:1px solid rgba(0,0,0,0.1);border-radius:12px;font-size:15px;background:rgba(255,255,255,0.8);color:#1a1a1a;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:#c026d3}
.btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#e879f9);color:#fff}
.btn-secondary{background:rgba(0,0,0,0.07);color:#555;width:auto;padding:10px 16px;font-size:13px;margin-top:0}
.btn-danger{background:rgba(255,255,255,0.6);color:#e05555;border:1px solid rgba(220,50,50,0.2);margin-top:8px}
.empty{text-align:center;padding:32px 0;color:#aaa;font-size:14px}
.hist-card{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,0.9);padding:14px;margin-bottom:10px}
.divider{height:1px;background:rgba(0,0,0,0.07);margin:14px 0}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,0.9);backdrop-filter:blur(10px);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}
.budget-btn-row{display:flex;gap:8px;margin-top:10px}
.budget-btn-row .btn{margin-top:0}
.s-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.s-label{font-size:13px;color:#444;min-width:110px;font-weight:500}
.s-input{flex:1;padding:8px 10px;border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-size:14px;background:rgba(255,255,255,0.8);color:#1a1a1a}
.s-input:focus{outline:none;border-color:#c026d3}

.pin-btn{padding:16px;border-radius:14px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.7);font-size:20px;font-weight:600;cursor:pointer;color:#1a1a1a;-webkit-tap-highlight-color:transparent}
.pin-btn:active{background:rgba(255,200,0,0.3);transform:scale(0.95)}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #c026d3;background:transparent;transition:background .15s}
.pin-dot.filled{background:#c026d3}
</style>
</head>
<body>

<div id="pin-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#ffe566 0%,#ffcc00 30%,#e879f9 70%,#c026d3 100%);z-index:1000;display:flex;align-items:center;justify-content:center">
  <div style="background:rgba(255,255,255,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:24px;padding:32px 28px;width:280px;border:1px solid rgba(255,255,255,0.9);text-align:center">
    <div style="font-size:40px;margin-bottom:10px">🔐</div>
    <div id="pin-title" style="font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:4px">Ledge</div>
    <div id="pin-subtitle" style="font-size:13px;color:#888;margin-bottom:20px">Authenticating...</div>
    <div id="faceid-section">
      <button id="faceid-btn" onclick="tryFaceId()" style="width:72px;height:72px;border-radius:50%;border:2px solid rgba(192,38,211,0.3);background:rgba(192,38,211,0.08);cursor:pointer;font-size:36px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="8" height="3" rx="1.5" fill="#c026d3"/>
          <rect x="2" y="2" width="3" height="8" rx="1.5" fill="#c026d3"/>
          <rect x="26" y="2" width="8" height="3" rx="1.5" fill="#c026d3"/>
          <rect x="31" y="2" width="3" height="8" rx="1.5" fill="#c026d3"/>
          <rect x="2" y="31" width="8" height="3" rx="1.5" fill="#c026d3"/>
          <rect x="2" y="26" width="3" height="8" rx="1.5" fill="#c026d3"/>
          <rect x="26" y="31" width="8" height="3" rx="1.5" fill="#c026d3"/>
          <rect x="31" y="26" width="3" height="8" rx="1.5" fill="#c026d3"/>
          <circle cx="13" cy="15" r="2" fill="#c026d3"/>
          <circle cx="23" cy="15" r="2" fill="#c026d3"/>
          <path d="M12 23 Q18 27 24 23" stroke="#c026d3" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M15 11 Q18 9 21 11" stroke="#c026d3" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <div id="faceid-label" style="font-size:13px;color:#c026d3;font-weight:600;margin-bottom:16px">Use Face ID</div>
      <button onclick="showPinFallback()" style="background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline">Use PIN instead</button>
    </div>
    <div id="pin-section" style="display:none">
      <div id="pin-dots" style="display:flex;justify-content:center;gap:10px;margin-bottom:20px"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn" onclick="pinPress('clear')" style="font-size:12px;color:#888">Clear</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn" onclick="pinPress('del')" style="font-size:18px">⌫</button>
      </div>
      <button onclick="showFaceIdSection()" style="background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline;margin-top:14px">Use Face ID instead</button>
    </div>
    <div id="pin-error" style="font-size:13px;color:#e05555;margin-top:12px;min-height:18px"></div>
  </div>
</div>
<div id="main-app" style="display:none">

<div class="header">
  <h1>Ledge</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="month" id="cur-month"></span>
    <button onclick="refreshData()" id="refresh-btn" style="background:none;border:none;cursor:pointer;padding:4px;border-radius:8px;color:#888;font-size:18px;line-height:1">↻</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="showTab('add')">+ Add</button>
  <button class="tab" onclick="showTab('budget')">Budget</button>
  <button class="tab" onclick="showTab('history')">History</button>
  <button class="tab" onclick="showTab('settings')">Settings</button>
</div>

<div class="content">

<div id="tab-dashboard">
  <div class="metrics" id="metrics"></div>
  <div class="card"><div class="card-title">Budget tracker</div><div id="bud-bars"></div></div>
  <div class="card"><div class="card-title">This month's transactions</div><div id="tx-list"></div></div>
</div>

<div id="tab-add" style="display:none">
  <div class="card">
    <div class="card-title">Add transaction</div>
    <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="tx-desc" placeholder="e.g. Whole Foods" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">Amount ($)</label><input class="form-input" id="tx-amount" type="number" placeholder="0.00" inputmode="decimal" min="0" step="0.01"/></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-input" id="tx-parent" onchange="updateSub()">
        <option value="grocery">Grocery</option>
        <option value="food">Food</option>
        <option value="entertainment">Entertainment</option>
        <option value="travel">Travel</option>
        <option value="transportation">Transportation</option>
        <option value="shopping">Shopping</option>
        <option value="health">Health</option>
        <option value="haircut">Haircut</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group" id="sub-group"><label class="form-label">Subcategory</label><select class="form-input" id="tx-sub"></select></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="tx-date" type="date"/></div>
    <button class="btn btn-primary" onclick="addTx()">Add transaction</button>
  </div>
</div>

<div id="tab-budget" style="display:none">
  <div class="card">
    <div class="card-title">Set monthly budgets</div>
    <div id="budget-inputs"></div>
    <div class="budget-btn-row">
      <button class="btn btn-secondary" onclick="useLastMonthBudget()">Use last month's</button>
      <button class="btn btn-primary" style="flex:1;width:auto;margin-top:0" onclick="saveBudgets()">Save budgets</button>
    </div>
  </div>
</div>

<div id="tab-history" style="display:none">
  <div id="hist-list"></div>
</div>

<div id="tab-settings" style="display:none">
  <div class="card">
    <div class="card-title">Settings</div>
    <div class="form-group"><label class="form-label">Monthly salary ($)</label><input class="form-input" id="salary-input" type="number" placeholder="0.00" inputmode="decimal"/></div>
    <button class="btn btn-primary" onclick="saveSalary()">Save salary</button>
    <div class="divider"></div>
    <div style="font-size:13px;color:#888;margin-bottom:8px">Subscriptions auto-charged at $60/month</div>
    <div class="divider"></div>
    <div style="font-size:13px;color:#888;margin-bottom:8px">Reset current month (archives data)</div>
    <button class="btn btn-danger" onclick="resetMonth()">Reset current month</button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const CATS={
  grocery:{label:'Grocery',color:'#16a34a',bg:'rgba(22,163,74,0.12)',grad:'linear-gradient(90deg,#4ade80,#16a34a)',subs:null},
  food:{label:'Food',color:'#d97706',bg:'rgba(217,119,6,0.12)',grad:'linear-gradient(90deg,#fcd34d,#f59e0b)',subs:['Delivery','Dining out']},
  entertainment:{label:'Entertainment',color:'#7c3aed',bg:'rgba(124,58,237,0.12)',grad:'linear-gradient(90deg,#a78bfa,#7c3aed)',subs:['Golf','Arts']},
  travel:{label:'Travel',color:'#0369a1',bg:'rgba(3,105,161,0.12)',grad:'linear-gradient(90deg,#60a5fa,#0369a1)',subs:['Hotel','Flights','Other']},
  transportation:{label:'Transportation',color:'#c2410c',bg:'rgba(194,65,12,0.12)',grad:'linear-gradient(90deg,#fb923c,#c2410c)',subs:['Zipcar','Transit','Rideshare']},
  shopping:{label:'Shopping',color:'#be185d',bg:'rgba(190,24,93,0.12)',grad:'linear-gradient(90deg,#f472b6,#be185d)',subs:['Clothing','Electronics','Home']},
  health:{label:'Health',color:'#0f766e',bg:'rgba(15,118,110,0.12)',grad:'linear-gradient(90deg,#2dd4bf,#0f766e)',subs:['Gym','Medical','Pharmacy']},
  haircut:{label:'Haircut',color:'#92400e',bg:'rgba(146,64,14,0.12)',grad:'linear-gradient(90deg,#fbbf24,#92400e)',subs:null},
  other:{label:'Other',color:'#6b7280',bg:'rgba(107,114,128,0.12)',grad:'linear-gradient(90deg,#9ca3af,#6b7280)',subs:['Other']}
};
const SUB_COST=60;
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const API='/api';
let state={salary:0,months:{}};
let saving=false;

async function loadState(){
  try{const r=await fetch(API+'/data');if(r.ok){state=await r.json();if(!state.months)state.months={};}}
  catch(e){const l=localStorage.getItem('ledge_v3');if(l)try{state=JSON.parse(l)}catch(e){}}
  renderAll();
}
async function saveStateRemote(){
  if(saving)return;saving=true;
  try{await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});localStorage.setItem('ledge_v3',JSON.stringify(state));}
  catch(e){localStorage.setItem('ledge_v3',JSON.stringify(state));}
  saving=false;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function mkKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function curMk(){return mkKey(new Date())}
function mlabel(mk){const[y,m]=mk.split('-');return MONTHS[parseInt(m)-1]+' '+y}
function getMD(mk){if(!state.months[mk])state.months[mk]={transactions:[],salary:state.salary,budgets:{}};if(!state.months[mk].budgets)state.months[mk].budgets={};if(state.months[mk].salary===undefined)state.months[mk].salary=state.salary;return state.months[mk]}
function totalSpent(md){return md.transactions.reduce((s,t)=>s+t.amount,0)+SUB_COST}
function calcSaved(md){return(md.salary||0)-totalSpent(md)}
function totalBudget(md){return Object.values(md.budgets||{}).reduce((s,v)=>s+(v||0),0)}
function catSpent(md,p){return md.transactions.filter(t=>t.parent===p).reduce((s,t)=>s+t.amount,0)}

function updateSub(){
  const p=document.getElementById('tx-parent').value;
  const cat=CATS[p];
  const sg=document.getElementById('sub-group');
  const ss=document.getElementById('tx-sub');
  if(!cat.subs){sg.style.display='none';return;}
  sg.style.display='';
  ss.innerHTML=cat.subs.map(x=>`<option value="${x.toLowerCase().replace(/ /g,'_')}">${x}</option>`).join('');
}

function renderBudgetInputs(){
  const mk=curMk();const md=getMD(mk);
  let html='';
  for(const[p,cat] of Object.entries(CATS)){
    const val=md.budgets[p]||'';
    html+=`<div class="s-row"><span class="s-label">${cat.label}</span><input class="s-input" id="bud-${p}" type="number" placeholder="0" value="${val}" inputmode="decimal"/></div>`;
  }
  document.getElementById('budget-inputs').innerHTML=html;
}

async function saveBudgets(){
  const mk=curMk();const md=getMD(mk);
  for(const p of Object.keys(CATS)){
    const v=parseFloat(document.getElementById('bud-'+p)?.value||0);
    md.budgets[p]=isNaN(v)?0:v;
  }
  await saveStateRemote();toast('Budgets saved');renderAll();
}

function useLastMonthBudget(){
  const mk=curMk();
  const skeys=Object.keys(state.months).filter(k=>!k.includes('arc')).sort();
  const pi=skeys.indexOf(mk)-1;
  if(pi<0){toast('No previous month found');return;}
  const prevBudgets=state.months[skeys[pi]].budgets||{};
  for(const p of Object.keys(CATS)){
    const input=document.getElementById('bud-'+p);
    if(input)input.value=prevBudgets[p]||'';
  }
  toast('Loaded last month\'s budgets');
}

async function addTx(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const parent=document.getElementById('tx-parent').value;
  const cat=CATS[parent];
  const sub=cat.subs?document.getElementById('tx-sub').value:null;
  const date=document.getElementById('tx-date').value;
  if(!desc||isNaN(amount)||amount<=0||!date){toast('Please fill in all fields');return}
  const mk=curMk();getMD(mk).transactions.push({desc,amount,parent,sub,date});
  await saveStateRemote();
  document.getElementById('tx-desc').value='';document.getElementById('tx-amount').value='';
  toast('Added!');renderAll();showTab('dashboard');
}

async function deleteTx(mk,idx){
  const md=getMD(mk);
  const sorted=[...md.transactions].sort((a,b)=>b.date.localeCompare(a.date));
  const target=sorted[idx];
  const ri=md.transactions.findIndex(t=>t.desc===target.desc&&t.amount===target.amount&&t.date===target.date&&t.parent===target.parent);
  if(ri>-1)md.transactions.splice(ri,1);
  await saveStateRemote();renderAll();
}

async function saveSalary(){
  const v=parseFloat(document.getElementById('salary-input').value);
  if(isNaN(v)||v<0){toast('Invalid salary');return}
  state.salary=v;getMD(curMk()).salary=v;
  await saveStateRemote();toast('Salary saved');renderAll();
}

async function resetMonth(){
  if(!confirm('Archive this month and start fresh?'))return;
  const mk=curMk();getMD(mk);
  state.months[mk+'_arc_'+Date.now()]=JSON.parse(JSON.stringify(state.months[mk]));
  state.months[mk]={transactions:[],salary:state.salary,budgets:{}};
  await saveStateRemote();renderAll();toast('Month reset');
}

function renderMetrics(){
  const mk=curMk();const md=getMD(mk);
  const spent=totalSpent(md);const saved=calcSaved(md);
  const tb=totalBudget(md);
  const budPct=tb>0?Math.round(spent/tb*100):0;
  const skeys=Object.keys(state.months).filter(k=>!k.includes('arc')).sort();
  const pi=skeys.indexOf(mk)-1;
  let trendHtml='<span style="color:#16a34a">First month</span>';
  if(pi>=0){const ps=calcSaved(state.months[skeys[pi]]);const diff=saved-ps;
    if(diff>0)trendHtml=`<span style="color:#16a34a">+$${Math.abs(diff).toFixed(0)} vs last mo</span>`;
    else if(diff<0)trendHtml=`<span style="color:#e05555">-$${Math.abs(diff).toFixed(0)} vs last mo</span>`;
    else trendHtml=`<span>Same as last mo</span>`;}
  document.getElementById('metrics').innerHTML=`
    <div class="metric m-salary"><div class="metric-label">Salary</div><div class="metric-value">$${(md.salary||0).toLocaleString()}</div></div>
    <div class="metric m-spent"><div class="metric-label">Spent</div><div class="metric-value">$${spent.toFixed(0)}</div></div>
    <div class="metric m-budget"><div class="metric-label">Total budget</div><div class="metric-value">$${tb.toLocaleString()}</div><div class="metric-sub">${budPct}% used</div></div>
    <div class="metric m-saved"><div class="metric-label">Saved</div><div class="metric-value">$${saved.toFixed(0)}</div><div class="metric-sub">${trendHtml}</div></div>`;
}

function renderBudBars(){
  const mk=curMk();const md=getMD(mk);
  let html='';let totalSpentCats=0;let totalBud=0;
  for(const[p,cat] of Object.entries(CATS)){
    const spent=catSpent(md,p);
    const bud=md.budgets[p]||0;
    if(spent===0&&bud===0)continue;
    totalSpentCats+=spent;totalBud+=bud;
    const isOver=bud>0&&spent>bud;
    const pct=bud>0?Math.min(spent/bud*100,100):0;
    const spentLabel=isOver?`<span class="over-spent">$${spent.toFixed(0)}</span>`:`<span class="spent">$${spent.toFixed(0)}</span>`;
    const subText=bud>0?(isOver?`Over by $${(spent-bud).toFixed(0)}`:`$${(bud-spent).toFixed(0)} left · ${Math.round(pct)}%`):'No budget set';
    html+=`<div class="bud-row">
      <div class="bud-header"><span class="bud-name">${cat.label}</span><span class="bud-nums">${spentLabel}${bud>0?' / $'+bud:''}</span></div>
      <div class="bud-track"><div class="bud-fill ${isOver?'over':''}" style="width:${pct.toFixed(1)}%;${isOver?'':'background:'+cat.grad}"></div></div>
      <div class="bud-sub ${isOver?'over':''}">${subText}</div>
    </div>`;
  }
  const subPct=totalBud>0?Math.min(SUB_COST/totalBud*100,100):0;
  html+=`<div class="bud-row">
    <div class="bud-header"><span class="bud-name">Subscriptions</span><span class="bud-nums"><span class="spent">$${SUB_COST}</span></span></div>
    <div class="bud-track"><div class="bud-fill" style="width:${subPct.toFixed(1)}%;background:linear-gradient(90deg,#e879f9,#c026d3)"></div></div>
    <div class="bud-sub">auto-charged</div>
  </div>`;
  const totalS=totalSpentCats+SUB_COST;
  html+=`<div class="bud-total"><span class="bud-total-label">Total</span><span class="bud-total-val">$${totalS.toFixed(0)}${totalBud>0?' / $'+totalBud:''}</span></div>`;
  document.getElementById('bud-bars').innerHTML=html||'<div class="empty">No transactions yet</div>';
}

function renderTxList(){
  const mk=curMk();const md=getMD(mk);
  const txs=[...md.transactions].sort((a,b)=>b.date.localeCompare(a.date));
  let html=`<div class="tx-item"><div><div class="tx-desc">Subscriptions</div><div class="tx-meta"><span class="badge" style="background:rgba(200,38,211,0.1);color:#c026d3">auto</span><span class="tx-date">${new Date().toISOString().slice(0,7)}</span></div></div><div class="tx-right"><div class="tx-amt">$${SUB_COST}</div></div></div>`;
  for(let i=0;i<txs.length;i++){
    const t=txs[i];const cat=CATS[t.parent]||CATS.other;
    const subLabel=t.sub?` · ${t.sub.replace(/_/g,' ')}`:'';
    html+=`<div class="tx-item"><div><div class="tx-desc">${t.desc}</div><div class="tx-meta"><span class="badge" style="background:${cat.bg};color:${cat.color}">${cat.label}${subLabel}</span><span class="tx-date">${t.date}</span></div></div><div class="tx-right"><div class="tx-amt">$${t.amount.toFixed(2)}</div><button class="del-btn" onclick="deleteTx('${mk}',${i})">×</button></div></div>`;
  }
  document.getElementById('tx-list').innerHTML=html;
}

function renderHist(){
  const skeys=Object.keys(state.months).filter(k=>!k.includes('arc')).sort().reverse();
  if(!skeys.length){document.getElementById('hist-list').innerHTML='<div class="empty">No history yet</div>';return}
  let html='';
  for(let i=0;i<skeys.length;i++){
    const mk=skeys[i];const md=state.months[mk];
    const spent=totalSpent(md);const saved=calcSaved(md);
    const prevMk=skeys[i+1];let trendHtml='';
    if(prevMk){const ps=calcSaved(state.months[prevMk]);const diff=saved-ps;
      if(diff>0)trendHtml=`<div style="font-size:12px;color:#16a34a;margin-top:8px">+$${Math.abs(diff).toFixed(0)} saved vs previous</div>`;
      else if(diff<0)trendHtml=`<div style="font-size:12px;color:#e05555;margin-top:8px">-$${Math.abs(diff).toFixed(0)} saved vs previous</div>`;
      else trendHtml=`<div style="font-size:12px;color:#888;margin-top:8px">Same as previous</div>`;}
    html+=`<div class="hist-card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:15px;font-weight:700">${mlabel(mk)}</div><div style="font-size:12px;color:#bbb">${md.transactions.length} transactions</div></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px"><div><div style="font-size:11px;color:#999">Salary</div><div style="font-size:15px;font-weight:700">$${(md.salary||0).toLocaleString()}</div></div><div><div style="font-size:11px;color:#999">Spent</div><div style="font-size:15px;font-weight:700;color:#e05555">$${spent.toFixed(0)}</div></div><div><div style="font-size:11px;color:#999">Saved</div><div style="font-size:15px;font-weight:700;color:${saved>=0?'#16a34a':'#e05555'}">$${saved.toFixed(0)}</div></div></div>${trendHtml}</div>`;
  }
  document.getElementById('hist-list').innerHTML=html;
}

function renderAll(){
  document.getElementById('cur-month').textContent=mlabel(curMk());
  renderMetrics();renderBudBars();renderTxList();renderHist();renderBudgetInputs();
  const si=document.getElementById('salary-input');if(si&&state.salary)si.value=state.salary;
}

// Auth logic - Face ID + PIN fallback
let pinEntry = '';
const PIN_KEY = 'ledge_pin';
const CRED_KEY = 'ledge_cred_id';
const SESSION_KEY = 'ledge_unlocked';

// --- Face ID ---
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function fromB64url(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  const bin = atob(s); const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}

async function registerFaceId() {
  try {
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'Ledge', id: location.hostname },
      user: { id: new Uint8Array(16), name: 'ledge_user', displayName: 'Ledge User' },
      pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
      authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
      timeout: 60000
    }});
    localStorage.setItem(CRED_KEY, b64url(cred.rawId));
    return true;
  } catch(e) { return false; }
}

async function verifyFaceId() {
  const credId = localStorage.getItem(CRED_KEY);
  if (!credId) return false;
  try {
    const assertion = await navigator.credentials.get({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rpId: location.hostname,
      allowCredentials: [{ type: 'public-key', id: fromB64url(credId) }],
      userVerification: 'required',
      timeout: 60000
    }});
    return !!assertion;
  } catch(e) { return false; }
}

async function tryFaceId() {
  const btn = document.getElementById('faceid-btn');
  const label = document.getElementById('faceid-label');
  btn.style.opacity = '0.5';
  label.textContent = 'Scanning...';
  document.getElementById('pin-error').textContent = '';

  const credId = localStorage.getItem(CRED_KEY);
  const pinStored = localStorage.getItem(PIN_KEY);

  if (!credId && !pinStored) {
    // First time setup
    document.getElementById('pin-subtitle').textContent = 'Set up Face ID for Ledge';
    const ok = await registerFaceId();
    if (ok) {
      sessionStorage.setItem(SESSION_KEY, '1');
      unlockApp();
      toast('Face ID set up!');
    } else {
      btn.style.opacity = '1';
      label.textContent = 'Use Face ID';
      document.getElementById('pin-error').textContent = 'Face ID failed — set a PIN instead';
      showPinFallback();
    }
    return;
  }

  if (credId) {
    const ok = await verifyFaceId();
    if (ok) {
      sessionStorage.setItem(SESSION_KEY, '1');
      unlockApp();
    } else {
      btn.style.opacity = '1';
      label.textContent = 'Use Face ID';
      document.getElementById('pin-error').textContent = 'Face ID failed';
    }
  }
}

function showPinFallback() {
  document.getElementById('faceid-section').style.display = 'none';
  document.getElementById('pin-section').style.display = '';
  document.getElementById('pin-subtitle').textContent = localStorage.getItem(PIN_KEY) ? 'Enter your PIN' : 'Set a PIN to protect your data';
  renderPinDots();
}

function showFaceIdSection() {
  document.getElementById('pin-section').style.display = 'none';
  document.getElementById('faceid-section').style.display = '';
  document.getElementById('pin-subtitle').textContent = 'Tap to authenticate';
}

// --- PIN ---
function getPinLength() {
  const stored = localStorage.getItem(PIN_KEY);
  return stored ? stored.length : 4;
}

function renderPinDots() {
  const len = getPinLength();
  const dots = document.getElementById('pin-dots');
  if (!dots) return;
  dots.innerHTML = Array.from({length: len}, (_, i) =>
    `<div class="pin-dot ${i < pinEntry.length ? 'filled' : ''}"></div>`
  ).join('');
}

function pinPress(val) {
  const stored = localStorage.getItem(PIN_KEY);
  const pinLen = stored ? stored.length : 4;
  if (val === 'del') { pinEntry = pinEntry.slice(0, -1); }
  else if (val === 'clear') { pinEntry = ''; }
  else if (pinEntry.length < pinLen) { pinEntry += val; }
  renderPinDots();
  document.getElementById('pin-error').textContent = '';
  if (pinEntry.length === pinLen) {
    setTimeout(() => {
      if (!stored) {
        localStorage.setItem(PIN_KEY, pinEntry);
        sessionStorage.setItem(SESSION_KEY, '1');
        unlockApp();
        toast('PIN set!');
      } else if (pinEntry === stored) {
        sessionStorage.setItem(SESSION_KEY, '1');
        unlockApp();
      } else {
        pinEntry = ''; renderPinDots();
        document.getElementById('pin-error').textContent = 'Incorrect PIN';
      }
    }, 100);
  }
}

function unlockApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main-app').style.display = '';
  loadState();
}

async function checkAuth() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') { unlockApp(); return; }
  const credId = localStorage.getItem(CRED_KEY);
  const pinStored = localStorage.getItem(PIN_KEY);
  const faceIdSupported = window.PublicKeyCredential && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);

  if (!credId && !pinStored) {
    // First time
    if (faceIdSupported) {
      document.getElementById('pin-subtitle').textContent = 'Tap Face ID to set up';
      tryFaceId();
    } else {
      document.getElementById('pin-subtitle').textContent = 'Set a PIN to protect your data';
      showPinFallback();
    }
    return;
  }
  if (credId && faceIdSupported) {
    document.getElementById('pin-subtitle').textContent = 'Tap to authenticate';
    tryFaceId();
  } else {
    showPinFallback();
  }
}

const shakeStyle = document.createElement('style');
shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}';
document.head.appendChild(shakeStyle);

checkAuth();
