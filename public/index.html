<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ledge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e8e8e4;padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header .month{font-size:13px;color:#888}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e4;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:12px 8px;font-size:13px;text-align:center;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;min-width:80px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.content{padding:16px;max-width:600px;margin:0 auto}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e4}
.metric-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.metric-value.pos{color:#2d7a4f}
.metric-value.neg{color:#c0392b}
.metric-sub{font-size:11px;margin-top:3px}
.metric-sub.up{color:#2d7a4f}
.metric-sub.down{color:#c0392b}
.metric-sub.neu{color:#888}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:13px;color:#555;min-width:105px}
.bar-track{flex:1;height:6px;background:#f0f0ec;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-amt{font-size:13px;font-weight:500;min-width:52px;text-align:right}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0ec}
.tx-item:last-child{border-bottom:none}
.tx-desc{font-size:15px;font-weight:500}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.tx-date{font-size:11px;color:#aaa}
.tx-right{display:flex;align-items:center;gap:10px}
.tx-amt{font-size:15px;font-weight:600}
.del-btn{width:24px;height:24px;border-radius:50%;border:1px solid #e8e8e4;background:#fff;color:#aaa;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-btn:active{background:#fee}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:#555;margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;padding:11px 14px;border:1px solid #e0e0da;border-radius:10px;font-size:15px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:#1a1a1a}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:4px}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-primary:active{opacity:.85}
.btn-danger{background:#fff;color:#c0392b;border:1px solid #e8c4c4;margin-top:8px}
.empty{text-align:center;padding:32px 0;color:#aaa;font-size:14px}
.hist-card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:14px;margin-bottom:10px}
.hist-month{font-size:15px;font-weight:600}
.hist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.hist-item-label{font-size:11px;color:#888}
.hist-item-val{font-size:15px;font-weight:600;margin-top:2px}
.hist-trend{font-size:12px;margin-top:8px}
.sub-line{font-size:12px;color:#aaa;padding-left:113px;margin-top:-6px;margin-bottom:8px}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>Ledge</h1>
  <span class="month" id="cur-month"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="showTab('add')">+ Add</button>
  <button class="tab" onclick="showTab('history')">History</button>
  <button class="tab" onclick="showTab('settings')">Settings</button>
</div>

<div class="content">

<div id="tab-dashboard">
  <div id="metrics" class="metrics"></div>
  <div class="card"><div class="card-title">Spending by category</div><div id="cat-bars"></div></div>
  <div class="card"><div class="card-title">This month's transactions</div><div id="tx-list"></div></div>
</div>

<div id="tab-add" style="display:none">
  <div class="card">
    <div class="card-title">Add transaction</div>
    <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="tx-desc" placeholder="e.g. Whole Foods" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">Amount ($)</label><input class="form-input" id="tx-amount" type="number" placeholder="0.00" inputmode="decimal" min="0" step="0.01"/></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-input" id="tx-parent" onchange="updateSub()">
        <option value="food">Food</option>
        <option value="entertainment">Entertainment</option>
        <option value="travel">Travel</option>
        <option value="transportation">Transportation</option>
        <option value="shopping">Shopping</option>
        <option value="health">Health</option>
        <option value="personal_care">Personal Care</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Subcategory</label><select class="form-input" id="tx-sub"></select></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="tx-date" type="date"/></div>
    <button class="btn btn-primary" onclick="addTx()">Add transaction</button>
  </div>
</div>

<div id="tab-history" style="display:none">
  <div id="hist-list"></div>
</div>

<div id="tab-settings" style="display:none">
  <div class="card">
    <div class="card-title">Settings</div>
    <div class="form-group"><label class="form-label">Monthly salary ($)</label><input class="form-input" id="salary-input" type="number" placeholder="0.00" inputmode="decimal"/></div>
    <button class="btn btn-primary" onclick="saveSalary()">Save salary</button>
    <div style="margin-top:16px;font-size:13px;color:#888">Subscriptions auto-charged at $60/month</div>
    <div style="height:1px;background:#f0f0ec;margin:16px 0"></div>
    <div style="font-size:13px;color:#888;margin-bottom:8px">Reset current month (archives data)</div>
    <button class="btn btn-danger" onclick="resetMonth()">Reset current month</button>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUBS={food:['Delivery','Dining out'],entertainment:['Golf','Arts'],travel:['Hotel','Flights','Other'],transportation:['Zipcar','Transit','Rideshare'],shopping:['Clothing','Electronics','Home'],health:['Gym','Medical','Pharmacy'],personal_care:['Haircut','Skincare','Spa'],other:['Other']};
const PLABELS={food:'Food',entertainment:'Entertainment',travel:'Travel',transportation:'Transportation',shopping:'Shopping',health:'Health',personal_care:'Personal Care',other:'Other'};
const PCOLORS={food:'#5a8f3c',entertainment:'#6c5ce7',travel:'#0984e3',transportation:'#e17055',shopping:'#d35400',health:'#e84393',personal_care:'#00b894',other:'#636e72'};
const PBGS={food:'#eaf4e0',entertainment:'#f0eeff',travel:'#e8f4fd',transportation:'#fdf0ec',shopping:'#fdf0e8',health:'#fde8f3',personal_care:'#e0faf4',other:'#f0f0ec'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SUB_COST=60;
const API='/api';

let state={salary:0,months:{}};
let saving=false;

async function loadState(){
  try{
    const r=await fetch(API+'/data');
    if(r.ok){state=await r.json();if(!state.months)state.months={};}
  }catch(e){
    const local=localStorage.getItem('ledge_cloud');
    if(local)try{state=JSON.parse(local)}catch(e){}
  }
  renderAll();
}

async function saveStateRemote(){
  if(saving)return;saving=true;
  try{
    await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
    localStorage.setItem('ledge_cloud',JSON.stringify(state));
  }catch(e){localStorage.setItem('ledge_cloud',JSON.stringify(state));}
  saving=false;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function mkKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function curMk(){return mkKey(new Date())}
function mlabel(mk){const[y,m]=mk.split('-');return MONTHS[parseInt(m)-1]+' '+y}
function getMD(mk){if(!state.months[mk])state.months[mk]={transactions:[],salary:state.salary};if(state.months[mk].salary===undefined)state.months[mk].salary=state.salary;return state.months[mk]}
function totalSpent(md){return md.transactions.reduce((s,t)=>s+t.amount,0)+SUB_COST}
function calcSaved(md){return(md.salary||0)-totalSpent(md)}

function updateSub(){
  const p=document.getElementById('tx-parent').value;
  const s=document.getElementById('tx-sub');
  s.innerHTML=SUBS[p].map(x=>`<option value="${x.toLowerCase().replace(/ /g,'_')}">${x}</option>`).join('');
}

async function addTx(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const parent=document.getElementById('tx-parent').value;
  const sub=document.getElementById('tx-sub').value;
  const date=document.getElementById('tx-date').value;
  if(!desc||isNaN(amount)||amount<=0||!date){toast('Please fill in all fields');return}
  const mk=curMk();getMD(mk).transactions.push({desc,amount,parent,sub,date});
  await saveStateRemote();
  document.getElementById('tx-desc').value='';
  document.getElementById('tx-amount').value='';
  toast('Added!');
  renderAll();showTab('dashboard');
}

async function deleteTx(mk,idx){
  const md=getMD(mk);
  const sorted=[...md.transactions].sort((a,b)=>b.date.localeCompare(a.date));
  const target=sorted[idx];
  const ri=md.transactions.findIndex(t=>t.desc===target.desc&&t.amount===target.amount&&t.date===target.date&&t.parent===target.parent);
  if(ri>-1)md.transactions.splice(ri,1);
  await saveStateRemote();renderAll();
}

async function saveSalary(){
  const v=parseFloat(document.getElementById('salary-input').value);
  if(isNaN(v)||v<0){toast('Invalid salary');return}
  state.salary=v;getMD(curMk()).salary=v;
  await saveStateRemote();toast('Salary saved');renderAll();
}

async function resetMonth(){
  if(!confirm('Archive this month and start fresh?'))return;
  const mk=curMk();getMD(mk);
  const ak=mk+'_arc_'+Date.now();
  state.months[ak]=JSON.parse(JSON.stringify(state.months[mk]));
  state.months[mk]={transactions:[],salary:state.salary};
  await saveStateRemote();renderAll();toast('Month reset');
}

function renderMetrics(){
  const mk=curMk();const md=getMD(mk);
  const spent=totalSpent(md);const saved=calcSaved(md);
  const skeys=Object.keys(state.months).filter(k=>!k.includes('arc')).sort();
  const pi=skeys.indexOf(mk)-1;
  let trendHtml='<span class="neu">First month</span>';
  if(pi>=0){const ps=calcSaved(state.months[skeys[pi]]);const diff=saved-ps;
    if(diff>0)trendHtml=`<span class="up">+$${Math.abs(diff).toFixed(0)} vs last mo</span>`;
    else if(diff<0)trendHtml=`<span class="down">-$${Math.abs(diff).toFixed(0)} vs last mo</span>`;
    else trendHtml=`<span class="neu">Same as last mo</span>`;
  }
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Salary</div><div class="metric-value">$${(md.salary||0).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Spent</div><div class="metric-value neg">$${spent.toFixed(0)}</div></div>
    <div class="metric"><div class="metric-label">Subscriptions</div><div class="metric-value">$${SUB_COST}</div><div class="metric-sub neu">auto</div></div>
    <div class="metric"><div class="metric-label">Saved</div><div class="metric-value ${saved>=0?'pos':'neg'}">$${saved.toFixed(0)}</div><div class="metric-sub">${trendHtml}</div></div>
  `;
}

function renderCatBars(){
  const mk=curMk();const md=getMD(mk);const spent=totalSpent(md);
  let html='';
  for(const p of Object.keys(PLABELS)){
    const tot=md.transactions.filter(t=>t.parent===p).reduce((s,t)=>s+t.amount,0);
    if(tot===0)continue;
    const pct=spent>0?(tot/spent*100):0;
    const subMap={};md.transactions.filter(t=>t.parent===p).forEach(t=>{subMap[t.sub]=(subMap[t.sub]||0)+t.amount});
    let subLines='';for(const[s,a] of Object.entries(subMap))subLines+=`<div class="sub-line">${s.replace(/_/g,' ')} · $${a.toFixed(0)}</div>`;
    html+=`<div class="bar-row"><div class="bar-label">${PLABELS[p]}</div><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${PCOLORS[p]}"></div></div><div class="bar-amt">$${tot.toFixed(0)}</div></div>${subLines}`;
  }
  const subPct=spent>0?(SUB_COST/spent*100):0;
  html+=`<div class="bar-row"><div class="bar-label">Subscriptions</div><div class="bar-track"><div class="bar-fill" style="width:${subPct.toFixed(1)}%;background:#6c5ce7"></div></div><div class="bar-amt">$${SUB_COST}</div></div><div class="sub-line">auto · $${SUB_COST}</div>`;
  document.getElementById('cat-bars').innerHTML=html||'<div class="empty">No transactions yet</div>';
}

function renderTxList(){
  const mk=curMk();const md=getMD(mk);
  const txs=[...md.transactions].sort((a,b)=>b.date.localeCompare(a.date));
  let html=`<div class="tx-item"><div><div class="tx-desc">Subscriptions</div><div class="tx-meta"><span class="badge" style="background:#f0eeff;color:#6c5ce7">auto</span><span class="tx-date">${new Date().toISOString().slice(0,7)}</span></div></div><div class="tx-right"><div class="tx-amt">$${SUB_COST}</div></div></div>`;
  for(let i=0;i<txs.length;i++){
    const t=txs[i];
    html+=`<div class="tx-item"><div><div class="tx-desc">${t.desc}</div><div class="tx-meta"><span class="badge" style="background:${PBGS[t.parent]};color:${PCOLORS[t.parent]}">${PLABELS[t.parent]} · ${t.sub.replace(/_/g,' ')}</span><span class="tx-date">${t.date}</span></div></div><div class="tx-right"><div class="tx-amt">$${t.amount.toFixed(2)}</div><button class="del-btn" onclick="deleteTx('${mk}',${i})">×</button></div></div>`;
  }
  document.getElementById('tx-list').innerHTML=html;
}

function renderHist(){
  const skeys=Object.keys(state.months).filter(k=>!k.includes('arc')).sort().reverse();
  if(!skeys.length){document.getElementById('hist-list').innerHTML='<div class="empty">No history yet</div>';return}
  let html='';
  for(let i=0;i<skeys.length;i++){
    const mk=skeys[i];const md=state.months[mk];
    const spent=totalSpent(md);const saved=calcSaved(md);
    const prevMk=skeys[i+1];let trendHtml='';
    if(prevMk){const ps=calcSaved(state.months[prevMk]);const diff=saved-ps;
      if(diff>0)trendHtml=`<div class="hist-trend" style="color:#2d7a4f">+$${Math.abs(diff).toFixed(0)} saved vs previous</div>`;
      else if(diff<0)trendHtml=`<div class="hist-trend" style="color:#c0392b">-$${Math.abs(diff).toFixed(0)} saved vs previous</div>`;
      else trendHtml=`<div class="hist-trend" style="color:#888">Same as previous</div>`;
    }
    html+=`<div class="hist-card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="hist-month">${mlabel(mk)}</div><div style="font-size:12px;color:#aaa">${md.transactions.length} transactions</div></div><div class="hist-grid"><div><div class="hist-item-label">Salary</div><div class="hist-item-val">$${(md.salary||0).toLocaleString()}</div></div><div><div class="hist-item-label">Spent</div><div class="hist-item-val" style="color:#c0392b">$${spent.toFixed(0)}</div></div><div><div class="hist-item-label">Saved</div><div class="hist-item-val" style="color:${saved>=0?'#2d7a4f':'#c0392b'}">$${saved.toFixed(0)}</div></div></div>${trendHtml}</div>`;
  }
  document.getElementById('hist-list').innerHTML=html;
}

function renderAll(){
  const mk=curMk();
  document.getElementById('cur-month').textContent=mlabel(mk);
  renderMetrics();renderCatBars();renderTxList();renderHist();
  const si=document.getElementById('salary-input');
  if(si&&state.salary)si.value=state.salary;
}

function showTab(name){
  ['dashboard','add','history','settings'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['dashboard','add','history','settings'][i]===name));
}

document.getElementById('tx-date').value=new Date().toISOString().split('T')[0];
updateSub();
loadState();
</script>
</body>
</html>
