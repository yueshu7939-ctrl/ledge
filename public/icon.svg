<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFD6F0"/>
    <stop offset="100%" stop-color="#C5EEFF"/>
  </linearGradient>
  <radialGradient id="coinGrad" cx="38%" cy="32%" r="68%">
    <stop offset="0%" stop-color="#FFF176"/>
    <stop offset="40%" stop-color="#FFD93D"/>
    <stop offset="100%" stop-color="#FFAA00"/>
  </radialGradient>
  <radialGradient id="shineGrad" cx="32%" cy="28%" r="45%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <filter id="coinShadow">
    <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#FF8FAB" flood-opacity="0.35"/>
  </filter>
</defs>

<!-- Background -->
<rect width="200" height="200" rx="46" fill="url(#bgGrad)"/>

<!-- Sparkles -->
<g transform="translate(158,32)">
  <polygon points="0,-9 2,-2 9,0 2,2 0,9 -2,2 -9,0 -2,-2" fill="#FF8FAB"/>
</g>
<g transform="translate(36,162)">
  <polygon points="0,-7 1.8,-1.8 7,0 1.8,1.8 0,7 -1.8,1.8 -7,0 -1.8,-1.8" fill="#82E0C4"/>
</g>
<circle cx="44" cy="42" r="5" fill="#C5A3FF" opacity="0.8"/>
<circle cx="163" cy="158" r="4" fill="#FFB347" opacity="0.9"/>
<g transform="translate(170,78)">
  <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#82CAFF"/>
</g>

<!-- Coin shadow -->
<circle cx="102" cy="107" r="70" fill="#FFAA00" opacity="0.2"/>

<!-- Main coin -->
<circle cx="100" cy="100" r="70" fill="url(#coinGrad)" stroke="#E8960A" stroke-width="4.5" filter="url(#coinShadow)"/>

<!-- Coin rim dashes -->
<circle cx="100" cy="100" r="64" fill="none" stroke="#E8960A" stroke-width="1.5" stroke-dasharray="3.5 5.5"/>

<!-- Inner ring -->
<circle cx="100" cy="100" r="54" fill="none" stroke="#E8960A" stroke-width="2" opacity="0.4"/>

<!-- ===== CUTE FACE ===== -->

<!-- Cat ears - rounded triangles -->
<path d="M 58,50 Q 62,20 78,32 Q 72,46 58,50 Z" fill="#FFD93D" stroke="#E8960A" stroke-width="2.5" stroke-linejoin="round"/>
<path d="M 142,50 Q 138,20 122,32 Q 128,46 142,50 Z" fill="#FFD93D" stroke="#E8960A" stroke-width="2.5" stroke-linejoin="round"/>
<!-- Inner ear pink -->
<path d="M 62,48 Q 65,26 76,34 Q 71,44 62,48 Z" fill="#FF8FAB" opacity="0.7"/>
<path d="M 138,48 Q 135,26 124,34 Q 129,44 138,48 Z" fill="#FF8FAB" opacity="0.7"/>

<!-- Eyes -->
<!-- Left eye -->
<ellipse cx="84" cy="95" rx="9" ry="11" fill="#2a1a00"/>
<ellipse cx="84" cy="95" rx="7.5" ry="9.5" fill="#1a0f00"/>
<circle cx="87" cy="91" r="3" fill="#ffffff"/>
<circle cx="82" cy="98" r="1.5" fill="#ffffff" opacity="0.6"/>

<!-- Right eye -->
<ellipse cx="116" cy="95" rx="9" ry="11" fill="#2a1a00"/>
<ellipse cx="116" cy="95" rx="7.5" ry="9.5" fill="#1a0f00"/>
<circle cx="119" cy="91" r="3" fill="#ffffff"/>
<circle cx="114" cy="98" r="1.5" fill="#ffffff" opacity="0.6"/>

<!-- Rosy cheeks -->
<ellipse cx="70" cy="112" rx="14" ry="9" fill="#FF8FAB" opacity="0.55"/>
<ellipse cx="130" cy="112" rx="14" ry="9" fill="#FF8FAB" opacity="0.55"/>

<!-- Nose -->
<ellipse cx="100" cy="108" rx="3.5" ry="2.5" fill="#C87000" opacity="0.6"/>

<!-- Smile -->
<path d="M 86 118 Q 100 132 114 118" fill="none" stroke="#2a1a00" stroke-width="3.5" stroke-linecap="round"/>

<!-- Shine overlay -->
<circle cx="100" cy="100" r="70" fill="url(#shineGrad)"/>

<!-- Coin accent stars -->
<g transform="translate(130,70)" opacity="0.7">
  <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#FFF9C4"/>
</g>
<g transform="translate(72,74)" opacity="0.6">
  <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="#FFF9C4"/>
</g>

</svg>
